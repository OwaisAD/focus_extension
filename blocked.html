<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stay Focused</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #131316;
      --border: #222228;
      --text: #e8e6e0;
      --muted: #5a5860;
      --accent: #c8b89a;
      --accent-dim: #6b5c45;
      --red: #c0392b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    .blocked-site {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent-dim);
      letter-spacing: 0.1em;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      line-height: 1;
      text-align: center;
      color: var(--text);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.3s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 4rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }

    .clock {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 4rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.6s forwards;
    }

    .actions {
      display: flex;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.7s forwards;
    }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.7rem 1.4rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
      background: rgba(200,184,154,0.04);
    }

    .btn-back {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .btn-back:hover {
      background: rgba(200,184,154,0.08);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,184,154,0.04) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="eyebrow">Focus Block</div>
    <div class="blocked-site" id="siteLabel">site blocked</div>
    <h1>Stay <em>present.</em></h1>
    <p class="subtitle">This site is on your block list.</p>
    <div class="clock" id="clock">—</div>
    <div class="divider"></div>
    <div class="actions">
      <button class="btn btn-back" onclick="history.back()">← Go Back</button>
      <a class="btn" href="#" id="settingsBtn">Manage List</a>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
