<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Focus Block — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #16161a;
      --border: #252529;
      --border-hover: #3a3a42;
      --text: #e4e2dc;
      --muted: #52505a;
      --accent: #c8b89a;
      --accent-dim: #6b5c45;
      --danger: #8b3030;
      --danger-text: #e07070;
    }

    html, body {
      width: 340px;
      min-height: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    .header {
      padding: 1.2rem 1.2rem 0.9rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text);
    }

    .header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .header .count {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: auto;
    }

    .add-section {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.5rem 0.7rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      letter-spacing: 0.02em;
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    input[type="text"]:focus {
      border-color: var(--accent-dim);
    }

    .btn-add {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 0.5rem 0.85rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: rgba(200,184,154,0.18);
      border-color: var(--accent-dim);
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .error-msg {
      padding: 0.4rem 1.2rem;
      font-size: 0.62rem;
      color: var(--danger-text);
      letter-spacing: 0.05em;
      display: none;
    }

    .error-msg.show { display: block; }

    .list-section {
      max-height: 280px;
      overflow-y: auto;
      padding: 0.4rem 0;
    }

    .list-section::-webkit-scrollbar { width: 3px; }
    .list-section::-webkit-scrollbar-track { background: transparent; }
    .list-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      padding: 2rem 1.2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }

    .empty-state .icon {
      font-size: 1.4rem;
      display: block;
      margin-bottom: 0.6rem;
      opacity: 0.4;
    }

    .site-item {
      display: flex;
      align-items: center;
      padding: 0.55rem 1.2rem;
      gap: 0.6rem;
      transition: background 0.1s;
      animation: slideIn 0.2s ease;
    }

    .site-item:hover {
      background: var(--surface);
    }

    .site-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-dim);
      flex-shrink: 0;
    }

    .site-name {
      flex: 1;
      font-size: 0.72rem;
      color: var(--text);
      letter-spacing: 0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.15rem 0.3rem;
      border-radius: 2px;
      transition: all 0.15s;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .site-item:hover .btn-remove {
      opacity: 1;
    }

    .btn-remove:hover {
      color: var(--danger-text);
      background: rgba(139,48,48,0.15);
    }

    .footer {
      padding: 0.6rem 1.2rem;
      border-top: 1px solid var(--border);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Focus <em>Block</em></h1>
    <span class="count" id="countLabel">0 sites</span>
  </div>

  <div class="add-section">
    <div class="input-wrap">
      <input type="text" id="siteInput" placeholder="reddit.com, youtube.com…" autocomplete="off"/>
    </div>
    <button class="btn-add" id="addBtn">+ Add</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="list-section" id="siteList">
    <div class="empty-state" id="emptyState">
      <span class="icon">◎</span>
      No sites blocked yet.<br/>Add a site above to get started.
    </div>
  </div>

  <div class="footer">Changes apply immediately</div>

  <script src="settings.js"></script>
</body>
</html>
